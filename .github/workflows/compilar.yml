name: Compilar Firmware ESP32

on:
  push:
    branches: [ "main", "master", "principal" ]
  pull_request:
    branches: [ "main", "master", "principal" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar o codigo do repositorio
        uses: actions/checkout@v4

      - name: Configurar o Python Estavel
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar o PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install -U platformio

      - name: Preparar e Compilar o Projeto
        run: |
          # 1. Limpeza total de caches antigos antes de qualquer coisa
          rm -rf nRFBox/.pio nRFBox/.platformio ~/.platformio
          
          # 2. Garante que a pasta destino existe
          mkdir -p nRFBox/src
          
          # 3. Busca e copia TODOS os arquivos de código para nRFBox/src/
          find . -type f \( -name "*.cpp" -o -name "*.h" -o -name "*.ino" \) -not -path "*/.pio/*" -exec cp {} nRFBox/src/ \; 2>/dev/null || true
          
          # 4. Força a criação do arquivo icone.h correto
          cd nRFBox/src
          find . -maxdepth 1 -type f -name "*.h" ! -name "icone.h" -exec grep -qE "unsigned char|static const" {} \; -exec cp {} icone.h \; 2>/dev/null || true
          cp *cone*.h icone.h 2>/dev/null || true
          
          # Garante que as chamadas no código fiquem sem acento
          sed -i 's/"ícone.h"/"icone.h"/g' * 2>/dev/null || true
          cd ../..
          
          # 5. Cria um platformio.ini blindado usando o ID oficial do registro de bibliotecas
          cat << 'EOF' > nRFBox/platformio.ini
          [env:esp32dev]
          platform = espressif32
          board = esp32dev
          framework = arduino
          monitor_speed = 115200
          
          lib_deps =
              olikraus/U8g2 @ ^2.36.18
              adafruit/Adafruit NeoPixel @ ^1.15.5
              nrf24/RF24 @ ^1.6.1
              lsatan/SmartRC-CC1101-Driver-Lib @ ^2.5.7
          EOF
          
          # 6. Executa a compilação
          cd nRFBox
          pio run

      - name: Guardar o arquivo compilado (.BIN)
        uses: actions/upload-artifact@v4
        with:
          name: nRFBox-Firmware
          path: nRFBox/.pio/build/**/*.bin
          
