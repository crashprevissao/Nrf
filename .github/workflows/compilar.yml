name: Compilar Firmware ESP32

on:
  push:
    branches: [ "main", "master", "principal" ]
  pull_request:
    branches: [ "main", "master", "principal" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Baixar o codigo do repositorio
      uses: actions/checkout@v4

    - name: Configurar o Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Instalar o PlatformIO
      run: |
        python -m pip install --upgrade pip
        pip install -U platformio

    - name: Preparar Estrutura e Compilar
      run: |
        # 1. Cria a pasta src dentro de nRFBox
        mkdir -p nRFBox/src
        
        # 2. Move todos os arquivos de código para o local correto
        find . -maxdepth 1 -name "*.cpp" -exec cp {} nRFBox/src/ \;
        find . -maxdepth 1 -name "*.h" -exec cp {} nRFBox/src/ \;
        find . -maxdepth 1 -name "*.ino" -exec cp {} nRFBox/src/ \;
        
        # 3. Garante que o platformio.ini esteja na pasta nRFBox
        cp platformio.ini nRFBox/ 2>/dev/null || echo "platformio.ini já existe"

        # 4. Entra na pasta nRFBox e instala bibliotecas antes de rodar
        cd nRFBox
        pio lib install
        pio run

    - name: Guardar o arquivo compilado (.BIN)
      uses: actions/upload-artifact@v4
      with:
        name: nRFBox-Firmware
        path: nRFBox/.pio/build/**/*.bin
        
