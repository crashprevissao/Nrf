name: Compilar Firmware ESP32

on:
  push:
    branches: [ "main", "master", "principal" ]
  pull_request:
    branches: [ "main", "master", "principal" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar o codigo do repositorio
        uses: actions/checkout@v4

      - name: Configurar o Python Estavel
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar o PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install -U platformio

      - name: Preparar e Compilar o Projeto
        run: |
          # 1. Limpeza total de pastas antigas para evitar lixo de build
          rm -rf nRFBox
          mkdir -p nRFBox/src
          
          # 2. Descobre onde está o seu arquivo .ino em qualquer lugar do repositório
          INO_PATH=$(find . -type f -name "*.ino" -o -name "*.INO" | head -n 1)
          echo "Arquivo principal detectado em: $INO_PATH"
          
          # 3. Cria o main.cpp correto injetando o cabeçalho do Arduino e o código completo do .ino
          echo '#include <Arduino.h>' > nRFBox/src/main.cpp
          cat "$INO_PATH" >> nRFBox/src/main.cpp
          
          # 4. Copia todos os outros arquivos .cpp e .h (exceto o próprio .ino e a pasta de destino)
          find . -type f \( -name "*.cpp" -o -name "*.h" \) -not -path "*/.pio/*" -not -path "*/nRFBox/*" -exec cp {} nRFBox/src/ \; 2>/dev/null || true
          
          # 5. Instala a biblioteca do CC1101 de forma isolada na pasta src
          mkdir -p cc1101_tmp
          curl -sSL https://github.com/LSatan/SmartRC-CC1101-Driver-Lib/archive/refs/heads/master.tar.gz | tar -xzf - -C cc1101_tmp --strip-components=1
          cp cc1101_tmp/*.cpp nRFBox/src/ 2>/dev/null || true
          cp cc1101_tmp/*.h nRFBox/src/ 2>/dev/null || true
          rm -rf cc1101_tmp
          
          # 6. Força a criação do arquivo icone.h correto e ajusta os acentos
          cd nRFBox/src
          find . -maxdepth 1 -type f -name "*.h" ! -name "icone.h" -exec grep -qE "unsigned char|static const" {} \; -exec cp {} icone.h \; 2>/dev/null || true
          cp *cone*.h icone.h 2>/dev/null || true
          sed -i 's/"ícone.h"/"icone.h"/g' * 2>/dev/null || true
          cd ../..
          
          # 7. Cria o platformio.ini blindado e sem conflitos
          cat << 'EOF' > nRFBox/platformio.ini
          [env:esp32dev]
          platform = espressif32
          board = esp32dev
          framework = arduino
          monitor_speed = 115200
          
          lib_deps =
              olikraus/U8g2 @ ^2.36.18
              adafruit/Adafruit NeoPixel @ ^1.15.5
              nrf24/RF24 @ ^1.6.1
          EOF
          
          # 8. Executa a compilação final
          cd nRFBox
          pio run

      - name: Guardar o arquivo compilado (.BIN)
        uses: actions/upload-artifact@v4
        with:
          name: nRFBox-Firmware
          path: nRFBox/.pio/build/**/*.bin
          
