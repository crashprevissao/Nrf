name: Compilar Firmware ESP32

on:
  push:
    branches: [ "main", "master", "principal" ]
  pull_request:
    branches: [ "main", "master", "principal" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar o codigo do repositorio
        uses: actions/checkout@v4

      - name: Configurar o Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar o PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install -U platformio

      - name: Preparar e Compilar o Projeto
        run: |
          echo ">>> 1. Limpando ambiente..."
          rm -rf pio_workspace
          mkdir -p pio_workspace/src
          
          echo ">>> 2. Copiando código do projeto..."
          find . -type f \( -name "*.cpp" -o -name "*.h" -o -name "*.ino" -o -name "*.INO" \) -not -path "*/.pio/*" -not -path "*/pio_workspace/*" -exec cp {} pio_workspace/src/ \; 2>/dev/null || true
          
          echo ">>> 3. Etapa de download manual desativada para evitar conflitos."
          
          echo ">>> 4. Normalizando ficheiro principal..."
          cd pio_workspace/src
          LOCAL_INO=$(find . -maxdepth 1 -iname "*.ino" | head -n 1)
          if [ -n "$LOCAL_INO" ]; then
            echo '#include <Arduino.h>' > main.cpp
            cat "$LOCAL_INO" >> main.cpp
            rm "$LOCAL_INO"
          fi
          
          echo ">>> 5. Normalizando nomes de ícones (icon.h, icone.h)..."
          ICON_SRC=$(find . -maxdepth 1 -name "*cone*.h" -o -name "icon.h" | head -n 1)
          if [ -n "$ICON_SRC" ]; then
            cp "$ICON_SRC" icon.h
            cp "$ICON_SRC" icone.h
            cp "$ICON_SRC" "ícone.h" 2>/dev/null || true
          fi
          
          cd ../..
          
          echo ">>> 6. Configurando platformio.ini..."
          cat << 'EOF' > pio_workspace/platformio.ini
          [env:esp32dev]
          platform = espressif32
          board = esp32dev
          framework = arduino
          monitor_speed = 115200
          lib_ldf_mode = deep+
          lib_deps =
              olikraus/U8g2 @ ^2.36.18
              adafruit/Adafruit NeoPixel @ ^1.15.5
              nrf24/RF24 @ ^1.6.1
              elechouse/Elechouse CC1101 @ ^1.7.9
          EOF
          
          echo ">>> 7. Compilando..."
          cd pio_workspace
          pio run
          
          echo "BIN_PATH=$(pwd)/.pio/build/esp32dev/firmware.bin" >> $GITHUB_ENV
          
