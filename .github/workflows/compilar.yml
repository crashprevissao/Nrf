name: Compilar Firmware ESP32

on:
  push:
    branches: [ "main", "master", "principal" ]
  pull_request:
    branches: [ "main", "master", "principal" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Baixar o codigo do repositorio
      uses: actions/checkout@v4

    - name: Configurar o Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Instalar o PlatformIO
      run: |
        python -m pip install --upgrade pip
        pip install -U platformio

    - name: Preparar e Compilar o Projeto
      run: |
        # Cria a pasta src dentro de nRFBox
        mkdir -p nRFBox/src
        
        # Move TUDO que for código da raiz para a pasta src dentro de nRFBox
        # Isso garante que, não importa onde você deixou, o compilador vai achar
        find . -maxdepth 1 -name "*.cpp" -exec cp {} nRFBox/src/ \;
        find . -maxdepth 1 -name "*.h" -exec cp {} nRFBox/src/ \;
        find . -maxdepth 1 -name "*.ino" -exec cp {} nRFBox/src/ \;
        
        # Copia o platformio.ini para dentro da nRFBox
        cp platformio.ini nRFBox/

        # Entra na pasta e compila
        cd nRFBox
        pio run

    - name: Guardar o arquivo compilado (.BIN)
      uses: actions/upload-artifact@v4
      with:
        name: nRFBox-Firmware
        path: nRFBox/.pio/build/**/*.bin
        
