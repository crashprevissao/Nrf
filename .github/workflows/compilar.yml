name: Compilar Firmware ESP32

on:
  push:
    branches: [ "main", "master", "principal" ]
  pull_request:
    branches: [ "main", "master", "principal" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Baixar o codigo do repositorio
      uses: actions/checkout@v4

    - name: Configurar o Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Instalar o PlatformIO
      run: |
        python -m pip install --upgrade pip
        pip install -U platformio

    - name: Compilar o Projeto apontando para a pasta correta
      run: |
        pio run --project-dir nRFBox -c ../platformio.ini

    - name: Guardar o arquivo compilado (.BIN)
      uses: actions/upload-artifact@v4
      with:
        name: nRFBox-Firmware
        path: nRFBox/.pio/build/**/*.bin
        
