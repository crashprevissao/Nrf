name: Compilar Firmware ESP32

on:
  push:
    branches: [ "main", "master", "principal" ]
  pull_request:
    branches: [ "main", "master", "principal" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Baixar o codigo do repositorio
      uses: actions/checkout@v4

    - name: Configurar o Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Instalar o PlatformIO
      run: |
        python -m pip install --upgrade pip
        pip install -U platformio

    - name: Preparar e Compilar o Projeto
      run: |
        # Corrige o problema da pasta 'src' estar na raiz:
        # Cria a pasta src dentro de nRFBox caso ela nao exista
        mkdir -p nRFBox/src
        
        # Move todos os arquivos de codigo da raiz para dentro de nRFBox/src/
        cp -r src/* nRFBox/src/
        
        # Garante que o arquivo platformio.ini principal va para a pasta certa
        cp platformio.ini nRFBox/

        # Entra na pasta e roda a compilacao
        cd nRFBox
        pio run

    - name: Guardar o arquivo compilado (.BIN)
      uses: actions/upload-artifact@v4
      with:
        name: nRFBox-Firmware
        path: nRFBox/.pio/build/**/*.bin
        
