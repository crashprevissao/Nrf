name: Compilar Firmware ESP32

on:
  push:
    branches: [ "main", "master", "principal" ]
  pull_request:
    branches: [ "main", "master", "principal" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar o codigo do repositorio
        uses: actions/checkout@v4

      - name: Configurar o Python Estavel
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar o PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install -U platformio

      - name: Preparar e Compilar o Projeto
        run: |
          # 1. Garante que a pasta destino existe
          mkdir -p nRFBox/src
          
          # 2. Busca e copia TODOS os arquivos de código de qualquer lugar para nRFBox/src/
          find . -type f \( -name "*.cpp" -o -name "*.h" -o -name "*.ino" \) -not -path "*/.pio/*" -exec cp {} nRFBox/src/ \; 2>/dev/null || true
          
          # 3. Resolve o problema do acento (ícone.h -> icone.h) tanto no arquivo quanto no código
          cd nRFBox/src
          if [ -f "ícone.h" ]; then
            mv "ícone.h" "icone.h"
          fi
          # Substitui a chamada no código de "ícone.h" para "icone.h" para o Linux aceitar
          sed -i 's/"ícone.h"/"icone.h"/g' * 2>/dev/null || true
          cd ../..
          
          # 4. Garante que o arquivo platformio.ini principal vá para a pasta nRFBox
          if [ -f "platformio.ini" ]; then
            cp platformio.ini nRFBox/
          fi
          
          # 5. Adiciona a biblioteca U8g2 que está faltando diretamente via comando
          cd nRFBox
          pio lib install "olikraus/U8g2"
          
          # 6. Roda a compilação final
          pio run

      - name: Guardar o arquivo compilado (.BIN)
        uses: actions/upload-artifact@v4
        with:
          name: nRFBox-Firmware
          path: nRFBox/.pio/build/**/*.bin
          
