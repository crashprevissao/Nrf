name: Compilar Firmware ESP32

on:
  push:
    branches: [ "main", "master", "principal" ]
  pull_request:
    branches: [ "main", "master", "principal" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar o codigo do repositorio
        uses: actions/checkout@v4

      - name: Configurar o Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar o PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install -U platformio

      - name: Preparar e Compilar o Projeto
        run: |
          echo ">>> 1. Limpando ambiente..."
          rm -rf pio_workspace
          mkdir -p pio_workspace/src
          
          # A pasta lib/ resolve o problema dos includes com < >
          mkdir -p pio_workspace/lib/CC1101
          
          echo ">>> 2. Copiando código do projeto..."
          find . -type f \( -name "*.cpp" -o -name "*.h" -o -name "*.ino" -o -name "*.INO" \) -not -path "*/.pio/*" -not -path "*/pio_workspace/*" -exec cp {} pio_workspace/src/ \; 2>/dev/null || true
          
          echo ">>> 3. Baixando e instalando CC1101 na pasta de bibliotecas locais (lib/)..."
          curl -sSL https://github.com/LSatan/SmartRC-CC1101-Driver-Lib/archive/refs/tags/v2.5.7.tar.gz | tar -xzf - -C pio_workspace/lib/CC1101 --strip-components=1
          
          echo ">>> 4. Convertendo INO para main.cpp ANTES de corrigir os textos..."
          cd pio_workspace/src
          LOCAL_INO=$(find . -maxdepth 1 -iname "*.ino" | head -n 1)
          if [ -n "$LOCAL_INO" ]; then
            echo '#include <Arduino.h>' > main.cpp
            cat "$LOCAL_INO" >> main.cpp
            rm "$LOCAL_INO"
          fi
          
          echo ">>> 5. Blindando a inclusão do icone.h em todos os arquivos gerados..."
          find . -maxdepth 1 -type f -name "*.h" ! -name "icone.h" -exec grep -qE "unsigned char|static const" {} \; -exec cp {} icone.h \; 2>/dev/null || true
          cp *cone*.h icone.h 2>/dev/null || true
          
          # Remove os acentos do código agora que o main.cpp já existe
          sed -i 's/"ícone.h"/"icone.h"/g' * 2>/dev/null || true
          sed -i 's/<ícone.h>/<icone.h>/g' * 2>/dev/null || true
          sed -i 's/"icon.h"/"icone.h"/g' * 2>/dev/null || true
          cd ../..
          
          echo ">>> 6. Configurando platformio.ini com LDF Deep+..."
          cat << 'EOF' > pio_workspace/platformio.ini
          [env:esp32dev]
          platform = espressif32
          board = esp32dev
          framework = arduino
          monitor_speed = 115200
          
          # Força o compilador a escanear a pasta lib/ e seus arquivos locais até achar as dependências
          lib_ldf_mode = deep+
          
          lib_deps =
              olikraus/U8g2 @ ^2.36.18
              adafruit/Adafruit NeoPixel @ ^1.15.5
              nrf24/RF24 @ ^1.6.1
          EOF
          
          echo ">>> 7. Compilando..."
          cd pio_workspace
          pio run
          
          echo "BIN_PATH=$(pwd)/.pio/build/esp32dev/firmware.bin" >> $GITHUB_ENV

      - name: Guardar o arquivo compilado (.BIN)
        uses: actions/upload-artifact@v4
        with:
          name: nRFBox-Firmware
          path: ${{ env.BIN_PATH }}
          
