name: Compilar Firmware ESP32

on:
  push:
    branches: [ "main", "master", "principal" ]
  pull_request:
    branches: [ "main", "master", "principal" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar o codigo do repositorio
        uses: actions/checkout@v4

      - name: Configurar o Python Estavel
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar o PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install -U platformio

      - name: Preparar e Compilar o Projeto
        run: |
          # 1. Localiza o arquivo .ino original no seu repositório
          INO_PATH=$(find . -type f -iname "*.ino" -not -path "*/.pio/*" | head -n 1)
          
          if [ -z "$INO_PATH" ]; then
            echo "ERRO CRÍTICO: Nenhum arquivo .ino encontrado!"
            exit 1
          fi
          
          PROJECT_DIR=$(dirname "$INO_PATH")
          echo "Diretório do projeto detectado: $PROJECT_DIR"
          cd "$PROJECT_DIR"
          
          # 2. Normaliza a estrutura para o padrão do PlatformIO (pasta src)
          if [ "$(basename "$PWD")" != "src" ]; then
            if [ ! -d "src" ]; then
              mkdir -p src
              find . -maxdepth 1 -type f \( -name "*.cpp" -o -name "*.h" -o -name "*.ino" \) -exec mv {} src/ \; 2>/dev/null || true
            fi
            cd src
          fi
          
          # 3. Corrige o arquivo icone.h (remover acentos)
          find . -maxdepth 1 -type f -name "*.h" ! -name "icone.h" -exec grep -qE "unsigned char|static const" {} \; -exec cp {} icone.h \; 2>/dev/null || true
          cp *cone*.h icone.h 2>/dev/null || true
          sed -i 's/"ícone.h"/"icone.h"/g' * 2>/dev/null || true
          
          # 4. Converte o .ino para main.cpp e INJETA o cabeçalho do CC1101
          # Isso força o PlatformIO a indexar a biblioteca logo no início da compilação
          LOCAL_INO=$(find . -maxdepth 1 -iname "*.ino" | head -n 1)
          if [ -n "$LOCAL_INO" ]; then
            echo "Convertendo $LOCAL_INO para main.cpp com injeção de dependência..."
            echo '#include <Arduino.h>' > main.cpp
            echo '#include <ELECHOUSE_CC1101_SRC_Arduino.h>' >> main.cpp
            cat "$LOCAL_INO" >> main.cpp
            rm "$LOCAL_INO"
          fi
          
          # Volta para a raiz do projeto (onde o platformio.ini deve ficar)
          cd ..
          if [ "$(basename "$PWD")" = "src" ]; then
            cd ..
          fi
          
          # 5. Cria o platformio.ini com modo de busca profunda agressivo (chain+)
          cat << 'EOF' > platformio.ini
          [env:esp32dev]
          platform = espressif32
          board = esp32dev
          framework = arduino
          monitor_speed = 115200
          
          # Modo de busca profunda que força o escaneamento de todas as bibliotecas do projeto
          lib_ldf_mode = chain+
          
          lib_deps =
              olikraus/U8g2 @ ^2.36.18
              adafruit/Adafruit NeoPixel @ ^1.15.5
              nrf24/RF24 @ ^1.6.1
              lsatan/SmartRC-CC1101-Driver-Lib @ ^2.5.7
          EOF
          
          echo "Estrutura de arquivos pronta:"
          ls -la
          ls -la src/
          
          # 6. Executa a compilação oficial
          pio run
          
          # Salva o caminho do binário gerado
          echo "BIN_PATH=$(pwd)/.pio/build/esp32dev/firmware.bin" >> $GITHUB_ENV

      - name: Guardar o arquivo compilado (.BIN)
        uses: actions/upload-artifact@v4
        with:
          name: nRFBox-Firmware
          path: ${{ env.BIN_PATH }}
          
