name: Compilar Firmware ESP32

on:
  push:
    branches: [ "main", "master", "principal" ]
  pull_request:
    branches: [ "main", "master", "principal" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar o codigo do repositorio
        uses: actions/checkout@v4

      - name: Configurar o Python Estavel
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar o PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install -U platformio

      - name: Preparar e Compilar o Projeto
        run: |
          # 1. Garante que a pasta destino existe e está limpa
          rm -rf nRFBox
          mkdir -p nRFBox/src
          
          # 2. Localiza o arquivo .ino original no seu repositório ANTES de mover os arquivos
          INO_ORIGINAL=$(find . -type f -iname "*.ino" -not -path "*/.pio/*" | head -n 1)
          
          if [ -n "$INO_ORIGINAL" ]; then
            echo "Arquivo principal .ino encontrado em: $INO_ORIGINAL"
            # Cria o main.cpp definitivo direto na pasta destino
            echo '#include <Arduino.h>' > nRFBox/src/main.cpp
            cat "$INO_ORIGINAL" >> nRFBox/src/main.cpp
          else
            echo "AVISO: Nenhum arquivo .ino foi encontrado na raiz!"
          fi
          
          # 3. Busca e copia os DEMAIS arquivos de código (.cpp e .h) para nRFBox/src/
          find . -type f \( -name "*.cpp" -o -name "*.h" \) -not -path "*/.pio/*" -not -path "*/nRFBox/*" -exec cp {} nRFBox/src/ \; 2>/dev/null || true
          
          # 4. Baixa a biblioteca CC1101 e extrai os arquivos diretamente na pasta src/
          mkdir -p cc1101_tmp
          curl -sSL https://github.com/LSatan/SmartRC-CC1101-Driver-Lib/archive/refs/heads/master.tar.gz | tar -xzf - -C cc1101_tmp --strip-components=1
          cp cc1101_tmp/*.cpp nRFBox/src/ 2>/dev/null || true
          cp cc1101_tmp/*.h nRFBox/src/ 2>/dev/null || true
          rm -rf cc1101_tmp
          
          # 5. Força a criação do arquivo icone.h correto
          cd nRFBox/src
          find . -maxdepth 1 -type f -name "*.h" ! -name "icone.h" -exec grep -qE "unsigned char|static const" {} \; -exec cp {} icone.h \; 2>/dev/null || true
          cp *cone*.h icone.h 2>/dev/null || true
          
          # Garante que as chamadas no código fiquem sem acento
          sed -i 's/"ícone.h"/"icone.h"/g' * 2>/dev/null || true
          cd ../..
          
          # 6. Cria um platformio.ini limpo apenas com as demais bibliotecas padrões
          cat << 'EOF' > nRFBox/platformio.ini
          [env:esp32dev]
          platform = espressif32
          board = esp32dev
          framework = arduino
          monitor_speed = 115200
          
          lib_deps =
              olikraus/U8g2 @ ^2.36.18
              adafruit/Adafruit NeoPixel @ ^1.15.5
              nrf24/RF24 @ ^1.6.1
          EOF
          
          # 7. Executa a compilação final
          cd nRFBox
          pio run

      - name: Guardar o arquivo compilado (.BIN)
        uses: actions/upload-artifact@v4
        with:
          name: nRFBox-Firmware
          path: nRFBox/.pio/build/**/*.bin
          
