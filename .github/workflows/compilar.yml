name: Compilar Firmware ESP32

on:
  push:
    branches: [ "main", "master", "principal" ]
  pull_request:
    branches: [ "main", "master", "principal" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar o codigo do repositorio
        uses: actions/checkout@v4

      - name: Configurar o Python Estavel
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar o PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install -U platformio

      - name: Preparar e Compilar o Projeto
        run: |
          # 1. Garante que a pasta destino existe
          mkdir -p nRFBox/src
          
          # 2. Busca e copia TODOS os arquivos de código de qualquer lugar para nRFBox/src/
          # (Isso evita o erro de "Nada para compilar")
          find . -type f \( -name "*.cpp" -o -name "*.h" -o -name "*.ino" \) -not -path "*/.pio/*" -exec cp {} nRFBox/src/ \; 2>/dev/null || true
          
          # 3. Garante que o arquivo platformio.ini principal vá para a pasta nRFBox
          if [ -f "platformio.ini" ]; then
            cp platformio.ini nRFBox/
          fi
          
          # 4. Mostra o que tem na pasta para termos certeza antes de compilar
          echo "=== Arquivos encontrados para compilar ==="
          ls -la nRFBox/src/
          
          # 5. Entra na pasta e roda a compilação
          cd nRFBox
          pio run

      - name: Guardar o arquivo compilado (.BIN)
        uses: actions/upload-artifact@v4
        with:
          name: nRFBox-Firmware
          path: nRFBox/.pio/build/**/*.bin
          
