name: Compilar Firmware ESP32

on:
  push:
    branches: [ "main", "master", "principal" ]
  pull_request:
    branches: [ "main", "master", "principal" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar o codigo do repositorio
        uses: actions/checkout@v4

      - name: Configurar o Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar o PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install -U platformio

      - name: Preparar e Compilar o Projeto
        run: |
          # 1. Força a criação da pasta necessária
          mkdir -p nRFBox/src
          
          # 2. Copia os arquivos de código da raiz para a pasta correta (sem travar se algum não existir)
          cp *.cpp nRFBox/src/ 2>/dev/null || true
          cp *.h nRFBox/src/ 2>/dev/null || true
          cp *.ino nRFBox/src/ 2>/dev/null || true
          
          # 3. Move o arquivo de configuração obrigatório
          if [ -f "platformio.ini" ]; then
            cp platformio.ini nRFBox/
          fi
          
          # 4. Entra e compila
          cd nRFBox
          pio run

      - name: Guardar o arquivo compilado (.BIN)
        uses: actions/upload-artifact@v4
        with:
          name: nRFBox-Firmware
          path: nRFBox/.pio/build/**/*.bin
          
