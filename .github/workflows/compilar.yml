name: Compilar Firmware ESP32

on:
  push:
    branches: [ "main", "master", "principal" ]
  pull_request:
    branches: [ "main", "master", "principal" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar o codigo do repositorio
        uses: actions/checkout@v4

      - name: Configurar o Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar o PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install -U platformio

      - name: Preparar e Compilar o Projeto
        run: |
          echo ">>> 1. Limpando ambiente e criando estrutura nativa..."
          rm -rf pio_workspace
          mkdir -p pio_workspace/src
          
          echo ">>> 2. Copiando todos os arquivos de código do projeto para a pasta src..."
          find . -type f \( -name "*.cpp" -o -name "*.h" -o -name "*.ino" -o -name "*.INO" \) -not -path "*/.pio/*" -not -path "*/pio_workspace/*" -exec cp {} pio_workspace/src/ \; 2>/dev/null || true
          
          echo ">>> 3. Ajustando o icone.h para o Linux não reclamar de acentos..."
          cd pio_workspace/src
          find . -maxdepth 1 -type f -name "*.h" ! -name "icone.h" -exec grep -qE "unsigned char|static const" {} \; -exec cp {} icone.h \; 2>/dev/null || true
          cp *cone*.h icone.h 2>/dev/null || true
          sed -i 's/"ícone.h"/"icone.h"/g' * 2>/dev/null || true
          
          echo ">>> 4. Convertendo o arquivo principal .ino para main.cpp..."
          LOCAL_INO=$(find . -maxdepth 1 -iname "*.ino" | head -n 1)
          if [ -n "$LOCAL_INO" ]; then
            echo '#include <Arduino.h>' > main.cpp
            cat "$LOCAL_INO" >> main.cpp
            rm "$LOCAL_INO"
          fi
          cd ../..
          
          echo ">>> 5. Criando platformio.ini definitivo com busca profunda de bibliotecas..."
          cat << 'EOF' > pio_workspace/platformio.ini
          [env:esp32dev]
          platform = espressif32
          board = esp32dev
          framework = arduino
          monitor_speed = 115200
          
          # Força o PlatformIO a escanear todos os arquivos locais (.h e .cpp) atrás de includes escondidos
          lib_ldf_mode = deep+
          
          # Todas as bibliotecas necessárias declaradas corretamente
          lib_deps =
              olikraus/U8g2 @ ^2.36.18
              adafruit/Adafruit NeoPixel @ ^1.15.5
              nrf24/RF24 @ ^1.6.1
              https://github.com/LSatan/SmartRC-CC1101-Driver-Lib.git
          EOF
          
          echo ">>> 6. Executando a compilação final..."
          cd pio_workspace
          pio run
          
          echo "BIN_PATH=$(pwd)/.pio/build/esp32dev/firmware.bin" >> $GITHUB_ENV

      - name: Guardar o arquivo compilado (.BIN)
        uses: actions/upload-artifact@v4
        with:
          name: nRFBox-Firmware
          path: ${{ env.BIN_PATH }}
          
